name: pgscp

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pgscp
      POSTGRES_PASSWORD: pgscp
      POSTGRES_DB: pgscp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgscp -d pgscp"]
      interval: 3s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: s3,sqs,secretsmanager
      DEBUG: "0"
      AWS_DEFAULT_REGION: us-east-1
      PGSCP_S3_RAW_BUCKET: pgscp-raw-events-local
      PGSCP_SQS_QUEUE_NAME: pgscp-events-local
    ports:
      - "4566:4566"
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep -q '\"s3\": \"running\"'"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 5s

  mock-partner:
    build: ./mock-partner
    environment:
      FAILURE_MODE: ${MOCK_FAILURE_MODE:-none}
      FAILURE_RATE: ${MOCK_FAILURE_RATE:-0.0}
      HMAC_SIGNING_KEY: local-dev-only-not-a-real-secret
      VERIFY_SIGNATURE: "true"
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://127.0.0.1:9000/health\", timeout=2).status==200 else 1)'"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../apps/api
    environment:
      PGSCP_ENV: local
      PGSCP_AWS_REGION: us-east-1
      PGSCP_AWS_ENDPOINT_URL: http://localstack:4566
      PGSCP_S3_RAW_BUCKET: pgscp-raw-events-local
      PGSCP_SQS_QUEUE_URL: http://localstack:4566/000000000000/pgscp-events-local
      PGSCP_LOG_LEVEL: INFO
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "8000:8000"
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://127.0.0.1:8000/health\", timeout=2).status==200 else 1)'"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ../apps/worker
    environment:
      PGSCP_ENV: local
      PGSCP_AWS_REGION: us-east-1
      PGSCP_AWS_ENDPOINT_URL: http://localstack:4566
      PGSCP_S3_RAW_BUCKET: pgscp-raw-events-local
      PGSCP_SQS_QUEUE_URL: http://localstack:4566/000000000000/pgscp-events-local
      PGSCP_DB_DSN: postgresql+psycopg://pgscp:pgscp@postgres:5432/pgscp
      PGSCP_SLACK_WEBHOOK_URL: http://mock-partner:9000/slack/webhook
      PGSCP_PAGERDUTY_URL: http://mock-partner:9000/pagerduty/v2/enqueue
      PGSCP_HMAC_SIGNING_KEY: local-dev-only-not-a-real-secret
      PGSCP_LATENCY_BREACH_MS: "1500"
      PGSCP_COST_ANOMALY_THRESHOLD_USD: "0.50"
      PGSCP_LOG_LEVEL: INFO
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mock-partner:
        condition: service_healthy

volumes:
  postgres-data:
